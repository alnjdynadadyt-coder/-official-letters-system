<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمر مباشرة وانفكاك مدرس</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            max-width: 700px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .form-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }
        h2 {
            color: #2c3e50;
            margin: 0;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .back-link {
            display: inline-block;
            background-color: #ecf0f1;
            color: #2c3e50;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-link:hover {
            background-color: #bdc3c7;
        }
        .back-link-bottom {
            display: block;
            text-align: center;
            margin-top: 20px;
        }

        #printArea {
            display: none;
        }

        /* تثبيت أبعاد ورقة A4 بدقة مطلقة للطباعة والحفظ */
        @media print {
            @page {
                size: A4;
                margin: 0mm;
            }
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 210mm;
                height: 297mm;
                overflow: hidden;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                box-sizing: border-box;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <!-- زر العودة العلوي -->
        <div class="form-header-flex">
            <h2>إدخال بيانات أمر المباشرة / الانفكاك</h2>
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>

        <form id="teacherForm" onsubmit="generatePDF(event)">
            
            <div class="form-group">
                <label>نظام النسخ في الورقة:</label>
                <select id="copiesLayout">
                    <option value="one">نسخة واحدة تملأ الصفحة</option>
                    <option value="two">نسختان متطابقتان في نفس الورقة (استغلال المساحات)</option>
                </select>
            </div>

            <div class="form-group">
                <label>الترويسة العليا:</label>
                <input type="text" id="headerTitleInput" required value="وزارة التربية">
            </div>

            <div class="form-group">
                <label>اسم المدرسة:</label>
                <input type="text" id="schoolNameInput" required placeholder="مثال: اعدادية النجدين للبنين">
            </div>

            <div class="form-group">
                <label>رقم العدد:</label>
                <input type="text" id="bookNumberInput" required placeholder="مثال: 135">
            </div>

            <div class="form-group">
                <label>التاريخ:</label>
                <input type="date" id="dateInput" required>
            </div>

            <div class="form-group">
                <label>إلى (الجهة الموجه لها الكتاب):</label>
                <input type="text" id="toInput" required placeholder="مثال: المديرية العامة لتربية القادسية">
            </div>

            <div class="form-group">
                <label>موضوع الكتاب (العنوان الرئيس):</label>
                <input type="text" id="subjectTitleInput" required placeholder="مثال: مباشرة مدرس / انفكاك مدرس">
            </div>

            <div class="form-group">
                <label>رقم الكتاب ذي العلاقة:</label>
                <input type="text" id="refBookNumInput" required placeholder="مثال: 1200">
            </div>

            <div class="form-group">
                <label>تاريخ الكتاب ذي العلاقة:</label>
                <input type="date" id="refBookDateInput" required>
            </div>

            <div class="form-group">
                <label>المتضمن (مثل: نقل، تنسيب، مباشرة):</label>
                <input type="text" id="contentNatureInput" required placeholder="مثال: نقل مدرسين">
            </div>

            <div class="form-group">
                <label>اسم المدرس:</label>
                <input type="text" id="teacherNameInput" required placeholder="مثال: علي علي علي">
            </div>

            <div class="form-group">
                <label>الاختصاص:</label>
                <input type="text" id="subjectInput" required placeholder="مثال: الإسلامية">
            </div>

            <div class="form-group">
                <label>تاريخ المباشرة الفعلي:</label>
                <input type="date" id="actionDateInput" required>
            </div>

            <div class="form-group">
                <label>اسم مدير المدرسة:</label>
                <input type="text" id="managerNameInput" required placeholder="مثال: عصام الاسدي">
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة الكتاب (PDF)</button>
        </form>

        <!-- زر العودة السفلي -->
        <div class="back-link-bottom">
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <!-- قالب الطباعة -->
    <div id="printArea">
        <div id="documentWrapper" style="width: 100%; height: 100%; box-sizing: border-box;"></div>
    </div>

    <script>
        function formatDateToDMY(dateString, includeDayName = false) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            const year = parts[0];
            const month = parts[1];
            const day = parts[2];
            
            const dateObj = new Date(year, month - 1, day);
            let dayName = '';
            if (includeDayName) {
                const daysOfWeek = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                dayName = daysOfWeek[dateObj.getDay()] + ' ';
            }
            return dayName + `${day}-${month}-${year}`;
        }

        function generatePDF(e) {
            e.preventDefault();
            
            const headerTitle = document.getElementById('headerTitleInput').value;
            const schoolName = document.getElementById('schoolNameInput').value;
            const bookNum = document.getElementById('bookNumberInput').value;
            const dateVal = formatDateToDMY(document.getElementById('dateInput').value);
            const toVal = document.getElementById('toInput').value;
            const subjectTitle = document.getElementById('subjectTitleInput').value;
            const refBookNum = document.getElementById('refBookNumInput').value;
            const refBookDate = formatDateToDMY(document.getElementById('refBookDateInput').value);
            const contentNature = document.getElementById('contentNatureInput').value;
            const teacherName = document.getElementById('teacherNameInput').value;
            const subject = document.getElementById('subjectInput').value;
            const actionDate = formatDateToDMY(document.getElementById('actionDateInput').value, true);
            const managerName = document.getElementById('managerNameInput').value;
            const layoutMode = document.getElementById('copiesLayout').value;

            // تصميم البطاقة مع تثبيت التوقيع في جهة اليمين بدقة
            const createCardHTML = (isTwoCopies) => `
                <div style="border: 2px solid #2c3e50; padding: ${isTwoCopies ? '8mm 12mm' : '15mm 20mm'}; border-radius: 6px; background: #fff; height: ${isTwoCopies ? '138mm' : '287mm'}; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div style="text-align: center; font-weight: bold; font-size: ${isTwoCopies ? '15px' : '19px'}; margin-bottom: ${isTwoCopies ? '3mm' : '6mm'};">
                            ${headerTitle}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: ${isTwoCopies ? '4mm' : '10mm'}; font-weight: bold; font-size: ${isTwoCopies ? '13px' : '15px'};">
                            <tr>
                                <td style="width: 50%; text-align: right;">إدارة / ${schoolName}</td>
                                <td style="width: 50%; text-align: left;">
                                    العدد: ${bookNum}<br>
                                    التاريخ: ${dateVal}
                                </td>
                            </tr>
                        </table>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '13.5px' : '16px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '4mm' : '8mm'};">
                            إلى / ${toVal}
                        </div>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '13.5px' : '16px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '6mm' : '12mm'};">
                            م/ ${subjectTitle}
                        </div>

                        <div style="font-size: ${isTwoCopies ? '13px' : '15.5px'}; line-height: ${isTwoCopies ? '1.7' : '2.1'}; text-align: justify; padding: 0 2mm;">
                            كتابكم المرقم (${refBookNum}) في (${refBookDate}) والمتضمن (${contentNature}).
                            <br>
                            باشر السيد (<b>${teacherName}</b>) مدرس اختصاص (${subject}) في مدرستنا يوم (${actionDate}) استناداً لأمركم الاداري اعلاه.
                        </div>
                    </div>

                    <div>
                        <div style="text-align: center; font-size: ${isTwoCopies ? '13.5px' : '16px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '6mm' : '12mm'};">
                            للعلـم مع التقـدير
                        </div>

                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="width: 45%; text-align: right; font-size: ${isTwoCopies ? '13px' : '15px'}; line-height: 1.5; padding-right: 15px;">
                                    مدير المدرسة<br>
                                    <b>${managerName}</b>
                                </td>
                                <td style="width: 55%;"></td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;

            const wrapper = document.getElementById('documentWrapper');

            if (layoutMode === 'two') {
                // نسختان متطابقتان في ورقة واحدة مع فاصل دقيق ومضبوط
                wrapper.innerHTML = `
                    <div style="height: 141mm; display: flex; flex-direction: column; justify-content: flex-start;">
                        ${createCardHTML(true)}
                    </div>
                    <div style="height: 141mm; display: flex; flex-direction: column; justify-content: flex-end;">
                        ${createCardHTML(true)}
                    </div>
                `;
            } else {
                // نسخة واحدة تملأ الورقة بالكامل مع توقيع في اليمين
                wrapper.innerHTML = `<div style="height: 297mm; display: flex; flex-direction: column; justify-content: center;">${createCardHTML(false)}</div>`;
            }

            window.print();
        }
    </script>

</body>
</html>
