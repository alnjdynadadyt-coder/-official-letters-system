<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمر مباشرة وانفكاك مدرس</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            max-width: 700px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }

        /* تنسيق الكتاب الرسمي المطابق للمخطط عند الطباعة */
        #printArea {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 100%;
                padding: 40px;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                font-size: 16px;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <h2>إدخال بيانات أمر المباشرة / الانفكاك</h2>
        <form id="teacherForm" onsubmit="generatePDF(event)">
            <div class="form-group">
                <label>اسم المدرسة (متغير أعلى الصفحة):</label>
                <input type="text" id="schoolNameInput" required placeholder="مثال: متوسطة الفراهيدي للبنين">
            </div>

            <div class="form-group">
                <label>رقم العدد:</label>
                <input type="text" id="bookNumberInput" required placeholder="مثال: 123">
            </div>

            <div class="form-group">
                <label>التاريخ:</label>
                <input type="date" id="dateInput" required>
            </div>

            <div class="form-group">
                <label>إلى (الجهة الموجه لها الكتاب):</label>
                <input type="text" id="toInput" required placeholder="مثال: الحسابات والتعليم المدرسي">
            </div>

            <div class="form-group">
                <label>نوع الأمر (مباشرة / انفكاك):</label>
                <select id="orderTypeInput" required>
                    <option value="مباشرة">مباشرة مدرس</option>
                    <option value="انفكاك">انفكاك مدرس</option>
                </select>
            </div>

            <div class="form-group">
                <label>رقم الكتاب ذي العلاقة:</label>
                <input type="text" id="refBookNumInput" required placeholder="مثال: 456">
            </div>

            <div class="form-group">
                <label>تاريخ الكتاب ذي العلاقة:</label>
                <input type="date" id="refBookDateInput" required>
            </div>

            <div class="form-group">
                <label>اسم المدرس الثلاثي أو الرباعي:</label>
                <input type="text" id="teacherNameInput" required placeholder="مثال: أحمد علي حسن">
            </div>

            <div class="form-group">
                <label>الاختصاص:</label>
                <input type="text" id="subjectInput" required placeholder="مثال: رياضيات">
            </div>

            <div class="form-group">
                <label>تاريخ المباشرة/الانفكاك الفعلي (اليوم):</label>
                <input type="date" id="actionDateInput" required>
            </div>

            <div class="form-group">
                <label>اسم مدير المدرسة (التوقيع):</label>
                <input type="text" id="managerNameInput" required placeholder="مثال: محمد عبد الله">
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة الكتاب (PDF)</button>
        </form>
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>

    <!-- قالب الكتاب الرسمي المطابق تماماً للمخطط -->
    <div id="printArea">
        <!-- أعلى الصفحة: إدارة المدرسة يمين، وزارة التربية في المنتصف -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; font-weight: bold; font-size: 16px; margin-bottom: 20px;">
            <div>إدارة / <span id="resSchoolName"></span></div>
            <div style="text-align: center; flex-grow: 1;">وزارة التربية</div>
            <div></div>
        </div>

        <!-- العدد والتاريخ في أعلى اليمين واليسار -->
        <div style="display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 30px; font-weight: bold;">
            <div>العدد: <span id="resBookNum"></span></div>
            <div>التاريخ: <span id="resDate"></span></div>
        </div>

        <!-- إلى / -->
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 20px;">
            إلى / <span id="resTo"></span>
        </div>

        <!-- م / الموضوع -->
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 40px;">
            م/ <span id="resSubjectTitle"></span>
        </div>

        <!-- متن الكتاب الثابت مع دمج المتغيرات في مكانها الصحيح -->
        <div style="font-size: 16px; line-height: 2.5; text-align: justify; margin-bottom: 60px;">
            كتابكم المرقم (<span id="resRefBookNum" style="font-weight: bold;"></span>) في (<span id="resRefBookDate"></span>) والمتضمن (<span id="resOrderTypeMain"></span>). باشـر السيد (<span id="resTeacherName" style="font-weight: bold;"></span>) بعنوان مدرس اختصاص (<span id="resSubject"></span>) في مدرستنا يوم (<span id="resActionDate"></span>) راجين تفضلكم باعتياره.
        </div>

        <div style="text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 60px;">
            للعلـم مع التقـدير
        </div>

        <!-- توقيع مدير المدرسة في اليسار -->
        <div style="float: left; text-align: center; font-size: 16px; width: 220px; line-height: 1.8;">
            مدير المدرسة<br>
            <span id="resManagerName" style="font-weight: bold;"></span><br>
            التوقيع والختم
        </div>
    </div>

    <script>
        function generatePDF(e) {
            e.preventDefault();
            
            // سحب القيم من الحقول وإسقاطها بدقة في قالب الطباعة
            document.getElementById('resSchoolName').innerText = document.getElementById('schoolNameInput').value;
            document.getElementById('resBookNum').innerText = document.getElementById('bookNumberInput').value;
            document.getElementById('resDate').innerText = document.getElementById('dateInput').value;
            document.getElementById('resTo').innerText = document.getElementById('toInput').value;
            
            const orderType = document.getElementById('orderTypeInput').value;
            document.getElementById('resSubjectTitle').innerText = orderType + ' مدرس';
            document.getElementById('resOrderTypeMain').innerText = orderType + ' مدرس';
            
            document.getElementById('resRefBookNum').innerText = document.getElementById('refBookNumInput').value;
            document.getElementById('resRefBookDate').innerText = document.getElementById('refBookBookDateInput') ? document.getElementById('refBookBookDateInput').value : document.getElementById('refBookDateInput').value;
            document.getElementById('resTeacherName').innerText = document.getElementById('teacherNameInput').value;
            document.getElementById('resSubject').innerText = document.getElementById('subjectInput').value;
            document.getElementById('resActionDate').innerText = document.getElementById('actionDateInput').value;
            document.getElementById('resManagerName').innerText = document.getElementById('managerNameInput').value;

            // فتح نافذة طباعة المتصفح لحفظ الملف بصيغة PDF فوراً
            window.print();
        }
    </script>

</body>
</html>
