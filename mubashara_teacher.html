<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمر مباشرة وانفكاك مدرس</title>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            direction: rtl;
            color: #2d3748;
        }
        .form-container {
            max-width: 750px;
            background: #ffffff;
            margin: 0 auto;
            padding: 18px 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border-top: 5px solid #3182ce;
        }
        .form-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 8px;
        }
        h2 {
            color: #1a202c;
            margin: 0;
            font-size: 19px;
            font-weight: 700;
        }
        
        .section-box {
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .sec-print { background: #f0f9ff; border-color: #bae6fd; }
        .sec-admin { background: #fdf4ff; border-color: #f5d0fe; }
        .sec-ref { background: #fefce8; border-color: #fef08a; }
        .sec-person { background: #f0fdf4; border-color: #bbf7d0; }

        .section-title {
            font-size: 13.5px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 4px;
        }
        .sec-print .section-title { color: #0284c7; }
        .sec-admin .section-title { color: #c084fc; }
        .sec-ref .section-title { color: #ca8a04; }
        .sec-person .section-title { color: #16a34a; }

        .form-group {
            margin-bottom: 8px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
            color: #4a5568;
            font-size: 12.5px;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
        }
        .btn-submit {
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            border: none;
            padding: 11px 20px;
            font-size: 14.5px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 4px;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.25);
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #2b6cb0 0%, #2c5282 100%);
            box-shadow: 0 6px 15px rgba(49, 130, 206, 0.35);
        }
        .back-link {
            display: inline-block;
            background-color: #edf2f7;
            color: #4a5568;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-link:hover {
            background-color: #e2e8f0;
            color: #1a202c;
        }
        .back-link-bottom {
            display: block;
            text-align: center;
            margin-top: 12px;
        }

        #printArea {
            display: none;
        }

        @media print {
            @page {
                size: A4;
                margin: 0mm;
            }
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 210mm;
                height: 297mm;
                overflow: hidden;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                box-sizing: border-box;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <div class="form-header-flex">
            <h2>إدخال أمر المباشرة / الانفكاك</h2>
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>

        <form id="teacherForm" onsubmit="generatePDF(event)">
            
            <div class="section-box sec-print">
                <div class="section-title">⚙️ الخيارات وطريقة الطباعة</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>نوع الكتاب:</label>
                        <select id="orderTypeInput">
                            <option value="mubashara">مباشرة مدرس / مدرسة</option>
                            <option value="infikak">انفكاك مدرس / مدرسة</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>نظام النسخ:</label>
                        <select id="copiesLayout">
                            <option value="one">نسخة واحدة (تملأ الصفحة)</option>
                            <option value="two">نسختان (نفس الورقة)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section-box sec-admin">
                <div class="section-title">📋 المعلومات الإدارية للكتاب</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>الترويسة العليا:</label>
                        <input type="text" id="headerTitleInput" required value="وزارة التربية">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>اسم المدرسة:</label>
                        <input type="text" id="schoolNameInput" required placeholder="  ">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div class="form-group" style="flex: 1;">
                        <label>رقم العدد:</label>
                        <input type="text" id="bookNumberInput" required placeholder="مثال102">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>التاريخ:</label>
                        <input type="date" id="dateInput" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 8px;">
                    <label>إلى (الجهة الموجه لها):</label>
                    <input type="text" id="toInput" required placeholder="مثال المديرية العامة لتربية القادسية - قسم الملاك الثانوي">
                </div>
            </div>

            <div class="section-box sec-ref">
                <div class="section-title">📂 الكتاب ذي العلاقة والمرجع</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>رقم الكتاب ذي العلاقة:</label>
                        <input type="text" id="refBookNumInput" required placeholder="مثال1200">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>تاريخ الكتاب ذي العلاقة:</label>
                        <input type="date" id="refBookDateInput" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 8px;">
                    <label>المتضمن (مثل: نقل مدرسين):</label>
                    <input type="text" id="contentNatureInput" required placeholder=" ">
                </div>
            </div>

            <div class="section-box sec-person">
                <div class="section-title">👤 بيانات المعني بالأمر</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>الجنس:</label>
                        <select id="genderInput">
                            <option value="male">ذكر (مدرس)</option>
                            <option value="female">أنثى (مدرسة)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>اسم المدرس / المدرسة:</label>
                        <input type="text" id="teacherNameInput" required placeholder="علي علي علي">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div class="form-group" style="flex: 1;">
                        <label>الاختصاص:</label>
                        <input type="text" id="subjectInput" required placeholder="التربية الاسلامية">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>تاريخ التنفيذ الفعلي:</label>
                        <input type="date" id="actionDateInput" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 8px;">
                    <label>اسم مدير المدرسة:</label>
                    <input type="text" id="managerNameInput" required placeholder="  ">
                </div>
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة الكتاب (PDF)</button>
        </form>

        <div class="back-link-bottom">
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <div id="printArea">
        <div id="documentWrapper" style="width: 100%; height: 100%; box-sizing: border-box;"></div>
    </div>

    <script>
        function formatDateToDMY(dateString, includeDayName = false) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            const year = parts[0];
            const month = parts[1];
            const day = parts[2];
            
            const dateObj = new Date(year, month - 1, day);
            let dayName = '';
            if (includeDayName) {
                const daysOfWeek = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                dayName = daysOfWeek[dateObj.getDay()] + ' ';
            }
            return dayName + `${day}-${month}-${year}`;
        }

        function generatePDF(e) {
            e.preventDefault();
            
            const orderType = document.getElementById('orderTypeInput').value;
            const headerTitle = document.getElementById('headerTitleInput').value;
            const schoolName = document.getElementById('schoolNameInput').value;
            const bookNum = document.getElementById('bookNumberInput').value;
            const dateVal = formatDateToDMY(document.getElementById('dateInput').value);
            const toVal = document.getElementById('toInput').value;
            const refBookNum = document.getElementById('refBookNumInput').value;
            const refBookDate = formatDateToDMY(document.getElementById('refBookDateInput').value);
            const contentNature = document.getElementById('contentNatureInput').value;
            
            const gender = document.getElementById('genderInput').value;
            const teacherName = document.getElementById('teacherNameInput').value;
            const subject = document.getElementById('subjectInput').value;
            const actionDate = formatDateToDMY(document.getElementById('actionDateInput').value, true);
            const managerName = document.getElementById('managerNameInput').value;
            const layoutMode = document.getElementById('copiesLayout').value;

            let subjectTitle = "";
            let actionText = "";

            if (orderType === 'infikak') {
                subjectTitle = "انفكاك مدرس";
                actionText = gender === 'female' ? 
                    `انفكت السيدة (<b>${teacherName}</b>) مدرسة اختصاص (${subject}) من مدرستنا يوم (${actionDate}) استناداً لأمركم الاداري اعلاه.` : 
                    `انفك السيد (<b>${teacherName}</b>) مدرس اختصاص (${subject}) من مدرستنا يوم (${actionDate}) استناداً لأمركم الاداري اعلاه.`;
            } else {
                subjectTitle = "مباشرة مدرس";
                actionText = gender === 'female' ? 
                    `باشرت السيدة (<b>${teacherName}</b>) مدرسة اختصاص (${subject}) في مدرستنا يوم (${actionDate}) استناداً لأمركم الاداري اعلاه.` : 
                    `باشر السيد (<b>${teacherName}</b>) مدرس اختصاص (${subject}) في مدرستنا يوم (${actionDate}) استناداً لأمركم الاداري اعلاه.`;
            }

            const createCardHTML = (isTwoCopies) => `
                <div style="margin: ${isTwoCopies ? '2mm 6mm' : '5mm 8mm'}; border: 2.5px solid #1a202c; padding: ${isTwoCopies ? '4mm 6mm' : '8mm 14mm'}; border-radius: 8px; background: #fff; height: ${isTwoCopies ? '135mm' : '287mm'}; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div style="text-align: center; font-weight: bold; font-size: ${isTwoCopies ? '13.5px' : '17.5px'}; margin-bottom: ${isTwoCopies ? '1.5mm' : '4mm'};">
                            ${headerTitle}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: ${isTwoCopies ? '2.5mm' : '6mm'}; font-weight: bold; font-size: ${isTwoCopies ? '12px' : '14.5px'};">
                            <tr>
                                <td style="width: 50%; text-align: right;">إدارة / ${schoolName}</td>
                                <td style="width: 50%; text-align: left;">
                                    العدد: ${bookNum}<br>
                                    التاريخ: ${dateVal}
                                </td>
                            </tr>
                        </table>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '2.5mm' : '5mm'};">
                            إلى / ${toVal}
                        </div>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '4mm' : '8mm'};">
                            م/ ${subjectTitle}
                        </div>

                        <div style="font-size: ${isTwoCopies ? '12px' : '14.5px'}; line-height: ${isTwoCopies ? '1.5' : '1.9'}; text-align: justify; padding: 0 2mm;">
                            كتابكم المرقم (${refBookNum}) في (${refBookDate}) والمتضمن (${contentNature}).
                            <br>
                            ${actionText}
                        </div>
                    </div>

                    <div style="margin-bottom: ${isTwoCopies ? '1.5mm' : '4mm'};">
                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '3mm' : '6mm'};">
                            للعلـم مع التقـدير
                        </div>

                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="width: 78%;"></td>
                                <td style="width: 22%; text-align: right; font-size: ${isTwoCopies ? '12px' : '14px'}; line-height: 1.3; padding-right: 5px;">
                                    <b>${managerName}</b><br>
                                    مدير المدرسة
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;

            const wrapper = document.getElementById('documentWrapper');

            if (layoutMode === 'two') {
                wrapper.innerHTML = `
                    <div style="height: 148.5mm; display: flex; flex-direction: column; justify-content: flex-start;">
                        ${createCardHTML(true)}
                    </div>
                    <div style="height: 148.5mm; display: flex; flex-direction: column; justify-content: flex-end;">
                        ${createCardHTML(true)}
                    </div>
                `;
            } else {
                wrapper.innerHTML = `<div style="height: 297mm; display: flex; flex-direction: column; justify-content: center;">${createCardHTML(false)}</div>`;
            }

            window.print();
        }
    </script>

</body>
</html>
