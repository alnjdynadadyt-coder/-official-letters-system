<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمر مباشرة وانفكاك مدرس</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            max-width: 700px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }

        #printArea {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 100%;
                padding: 40px;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                font-size: 16px;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <h2>إدخال بيانات أمر المباشرة / الانفكاك</h2>
        <form id="teacherForm" onsubmit="generatePDF(event)">
            <div class="form-group">
                <label>اسم المدرسة:</label>
                <input type="text" id="schoolNameInput" required placeholder="مثال: اعدادية النجدين للبنين">
            </div>

            <div class="form-group">
                <label>رقم العدد:</label>
                <input type="text" id="bookNumberInput" required placeholder="مثال: 135">
            </div>

            <div class="form-group">
                <label>التاريخ:</label>
                <input type="date" id="dateInput" required>
            </div>

            <div class="form-group">
                <label>إلى (الجهة الموجه لها الكتاب):</label>
                <input type="text" id="toInput" required placeholder="مثال: المديرية العامة لتربية القادسية">
            </div>

            <div class="form-group">
                <label>موضوع الكتاب (العنوان الرئيس):</label>
                <input type="text" id="subjectTitleInput" required placeholder="مثال: مباشرة مدرس / انفكاك مدرس">
            </div>

            <div class="form-group">
                <label>رقم الكتاب ذي العلاقة:</label>
                <input type="text" id="refBookNumInput" required placeholder="مثال: 1200">
            </div>

            <div class="form-group">
                <label>تاريخ الكتاب ذي العلاقة:</label>
                <input type="date" id="refBookDateInput" required>
            </div>

            <div class="form-group">
                <label>المتضمن (عنوان الطلب/القرار مثل: نقل، تنسيب، مباشرة):</label>
                <input type="text" id="contentNatureInput" required placeholder="مثال: نقل / تنسيب / مباشرة">
            </div>

            <div class="form-group">
                <label>اسم المدرس:</label>
                <input type="text" id="teacherNameInput" required placeholder="مثال: علي علي علي">
            </div>

            <div class="form-group">
                <label>الاختصاص:</label>
                <input type="text" id="subjectInput" required placeholder="مثال: الإسلامية">
            </div>

            <div class="form-group">
                <label>تاريخ المباشرة الفعلي (اليوم):</label>
                <input type="date" id="actionDateInput" required>
            </div>

            <div class="form-group">
                <label>اسم مدير المدرسة:</label>
                <input type="text" id="managerNameInput" required placeholder="مثال: محمد الأحمدي">
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة الكتاب (PDF)</button>
        </form>
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>

    <!-- قالب الكتاب الرسمي مع إطار جمالي أنيق -->
    <div id="printArea" style="border: 3px double #2c3e50; padding: 40px; border-radius: 8px; position: relative;">
        
        <!-- الترويسة: المديرية العامة لتربية القادسية في المنتصف تماماً -->
        <div style="text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 10px;">
            وزارة التربية
        </div>

        <!-- اسم المدرسة على اليمين، والعدد والتاريخ في اليسار -->
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px; font-weight: bold; font-size: 15px;">
            <tr>
                <td style="width: 50%; text-align: right;">إدارة / <span id="resSchoolName"></span></td>
                <td style="width: 50%; text-align: left;">
                    العدد: <span id="resBookNum"></span><br>
                    التاريخ: <span id="resDate"></span>
                </td>
            </tr>
        </table>

        <!-- إلى / بتوسيط الصفحة -->
        <div style="text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 20px;">
            إلى / <span id="resTo"></span>
        </div>

        <!-- م / بتوسيط الصفحة -->
        <div style="text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 40px;">
            م/ <span id="resSubjectTitle"></span>
        </div>

        <!-- متن الكتاب -->
        <div style="font-size: 16px; line-height: 2.5; text-align: justify; margin-bottom: 50px; padding: 0 20px;">
            كتابكم المرقم (<span id="resRefBookNum" style="font-weight: bold;"></span>) في (<span id="resRefBookDate"></span>) والمتضمن (<span id="resContentNature" style="font-weight: bold;"></span>). باشر السيد (<span id="resTeacherName" style="font-weight: bold;"></span>) بعنوان مدرس اختصاص (<span id="resSubject"></span>) في مدرستنا يوم (<span id="resActionDate"></span>) راجين تفضلكم باعتياره.
        </div>

        <!-- للعلم مع التقدير في منتصف الصفحة -->
        <div style="text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 60px;">
            للعلـم مع التقـدير
        </div>

        <!-- مدير المدرسة في جهة اليسار وتحتها التوقيع والختم -->
        <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
            <div style="text-align: center; font-size: 16px; width: 220px; line-height: 1.8;">
                مدير المدرسة<br>
                <span id="resManagerName" style="font-weight: bold;"></span><br>
                التوقيع والختم
            </div>
        </div>
    </div>

    <script>
        function generatePDF(e) {
            e.preventDefault();
            
            document.getElementById('resSchoolName').innerText = document.getElementById('schoolNameInput').value;
            document.getElementById('resBookNum').innerText = document.getElementById('bookNumberInput').value;
            document.getElementById('resDate').innerText = document.getElementById('dateInput').value;
            document.getElementById('resTo').innerText = document.getElementById('toInput').value;
            document.getElementById('resSubjectTitle').innerText = document.getElementById('subjectTitleInput').value;
            document.getElementById('resRefBookNum').innerText = document.getElementById('refBookNumInput').value;
            document.getElementById('resRefBookDate').innerText = document.getElementById('refBookDateInput').value;
            document.getElementById('resContentNature').innerText = document.getElementById('contentNatureInput').value;
            document.getElementById('resTeacherName').innerText = document.getElementById('teacherNameInput').value;
            document.getElementById('resSubject').innerText = document.getElementById('subjectInput').value;
            document.getElementById('resActionDate').innerText = document.getElementById('actionDateInput').value;
            document.getElementById('resManagerName').innerText = document.getElementById('managerNameInput').value;

            window.print();
        }
    </script>

</body>
</html>
