<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمر مباشرة وانفكاك مدرس</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            max-width: 700px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }

        #printArea {
            display: none;
        }

        /* تنسيق الطباعة لضمان عدم خروج أي جزء لصفحة ثانية */
        @media print {
            @page {
                size: A4;
                margin: 5mm;
            }
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 100%;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                font-size: 14.5px;
                box-sizing: border-box;
            }
            .page-break {
                page-break-after: always;
                height: 50vh;
                box-sizing: border-box;
                overflow: hidden;
            }
            .single-page {
                height: 98vh;
                overflow: hidden;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <h2>إدخال بيانات أمر المباشرة / الانفكاك</h2>
        <form id="teacherForm" onsubmit="generatePDF(event)">
            
            <div class="form-group">
                <label>نظام النسخ في الورقة:</label>
                <select id="copiesLayout">
                    <option value="one">نسخة واحدة في الصفحة</option>
                    <option value="two">نسختان متطابقتان في نفس الورقة (نصفين)</option>
                </select>
            </div>

            <div class="form-group">
                <label>الترويسة العليا (مثال: وزارة التربية / أو جهة أخرى):</label>
                <input type="text" id="headerTitleInput" required value="وزارة التربية">
            </div>

            <div class="form-group">
                <label>اسم المدرسة:</label>
                <input type="text" id="schoolNameInput" required placeholder="مثال: اعدادية النجدين للبنين">
            </div>

            <div class="form-group">
                <label>رقم العدد:</label>
                <input type="text" id="bookNumberInput" required placeholder="مثال: 135">
            </div>

            <div class="form-group">
                <label>التاريخ:</label>
                <input type="date" id="dateInput" required>
            </div>

            <div class="form-group">
                <label>إلى (الجهة الموجه لها الكتاب):</label>
                <input type="text" id="toInput" required placeholder="مثال: المديرية العامة لتربية القادسية">
            </div>

            <div class="form-group">
                <label>موضوع الكتاب (العنوان الرئيس):</label>
                <input type="text" id="subjectTitleInput" required placeholder="مثال: مباشرة مدرس / انفكاك مدرس">
            </div>

            <div class="form-group">
                <label>رقم الكتاب ذي العلاقة:</label>
                <input type="text" id="refBookNumInput" required placeholder="مثال: 1200">
            </div>

            <div class="form-group">
                <label>تاريخ الكتاب ذي العلاقة:</label>
                <input type="date" id="refBookDateInput" required>
            </div>

            <div class="form-group">
                <label>المتضمن (مثل: نقل، تنسيب، مباشرة):</label>
                <input type="text" id="contentNatureInput" required placeholder="مثال: نقل مدرسين">
            </div>

            <div class="form-group">
                <label>اسم المدرس:</label>
                <input type="text" id="teacherNameInput" required placeholder="مثال: علي علي علي">
            </div>

            <div class="form-group">
                <label>الاختصاص:</label>
                <input type="text" id="subjectInput" required placeholder="مثال: الإسلامية">
            </div>

            <div class="form-group">
                <label>تاريخ المباشرة الفعلي:</label>
                <input type="date" id="actionDateInput" required>
            </div>

            <div class="form-group">
                <label>اسم مدير المدرسة:</label>
                <input type="text" id="managerNameInput" required placeholder="مثال: محمد الأحمدي">
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة الكتاب (PDF)</button>
        </form>
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>

    <!-- قالب الطباعة -->
    <div id="printArea">
        <div id="documentWrapper">
            <!-- سيتم توليد المحتوى هنا برمجياً (نسخة واحدة أو نسختين) -->
        </div>
    </div>

    <script>
        // دالة لتحويل التاريخ إلى صيغة (يوم - شهر - سنة) مع اسم اليوم
        function formatDateToDMY(dateString, includeDayName = false) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            const year = parts[0];
            const month = parts[1];
            const day = parts[2];
            
            const dateObj = new Date(year, month - 1, day);
            let dayName = '';
            if (includeDayName) {
                const daysOfWeek = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                dayName = daysOfWeek[dateObj.getDay()] + ' ';
            }
            return dayName + `${day}-${month}-${year}`;
        }

        function generatePDF(e) {
            e.preventDefault();
            
            const headerTitle = document.getElementById('headerTitleInput').value;
            const schoolName = document.getElementById('schoolNameInput').value;
            const bookNum = document.getElementById('bookNumberInput').value;
            const dateVal = formatDateToDMY(document.getElementById('dateInput').value);
            const toVal = document.getElementById('toInput').value;
            const subjectTitle = document.getElementById('subjectTitleInput').value;
            const refBookNum = document.getElementById('refBookNumInput').value;
            const refBookDate = formatDateToDMY(document.getElementById('refBookDateInput').value);
            const contentNature = document.getElementById('contentNatureInput').value;
            const teacherName = document.getElementById('teacherNameInput').value;
            const subject = document.getElementById('subjectInput').value;
            const actionDate = formatDateToDMY(document.getElementById('actionDateInput').value, true);
            const managerName = document.getElementById('managerNameInput').value;
            const layoutMode = document.getElementById('copiesLayout').value;

            // بناء محتوى الكتاب المنفرد
            const singleTemplate = `
                <div style="border: 2px solid #2c3e50; padding: 20px; border-radius: 6px;">
                    <div style="text-align: center; font-weight: bold; font-size: 17px; margin-bottom: 8px;">
                        ${headerTitle}
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px; font-weight: bold; font-size: 14.5px;">
                        <tr>
                            <td style="width: 50%; text-align: right;">إدارة / ${schoolName}</td>
                            <td style="width: 50%; text-align: left;">
                                العدد: ${bookNum}<br>
                                التاريخ: ${dateVal}
                            </td>
                        </tr>
                    </table>

                    <div style="text-align: center; font-size: 15px; font-weight: bold; margin-bottom: 12px;">
                        إلى / ${toVal}
                    </div>

                    <div style="text-align: center; font-size: 15px; font-weight: bold; margin-bottom: 20px;">
                        م/ ${subjectTitle}
                    </div>

                    <div style="font-size: 15px; line-height: 2.1; text-align: justify; margin-bottom: 25px; padding: 0 5px;">
                        كتابكم المرقم (${refBookNum}) في (${refBookDate}) والمتضمن (${contentNature}).
                        <br>
                        باشر السيد (<b>${teacherName}</b>) مدرس اختصاص (${subject}) في مدرستنا يوم (${actionDate}) راجين تفضلكم باعتياره.
                    </div>

                    <div style="text-align: center; font-size: 15px; font-weight: bold; margin-bottom: 25px;">
                        للعلـم مع التقـدير
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                        <tr>
                            <td style="width: 60%;"></td>
                            <td style="width: 40%; text-align: center; font-size: 15px; line-height: 1.6;">
                                مدير المدرسة<br>
                                <b>${managerName}</b>
                            </td>
                        </tr>
                    </table>
                </div>
            `;

            const wrapper = document.getElementById('documentWrapper');

            if (layoutMode === 'two') {
                // نسختان متطابقتان في ورقة واحدة مقسمة لنصفين
                wrapper.innerHTML = `
                    <div class="page-break">${singleTemplate}</div>
                    <div class="single-page">${singleTemplate}</div>
                `;
            } else {
                // نسخة واحدة ملء الصفحة تماماً بدون صفحة ثانية فارغة
                wrapper.innerHTML = `<div class="single-page">${singleTemplate}</div>`;
            }

            window.print();
        }
    </script>

</body>
</html>
