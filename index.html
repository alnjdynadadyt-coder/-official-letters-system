<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار الكتب والمخاطبات الرسمية</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body {
            /* اللون الافتراضي: البصلي الفاخر */
            background: radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            direction: rtl;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin: auto;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
        }

        /* زر تغيير الألوان العائم */
        .theme-selector {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .theme-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.6);
            cursor: pointer;
            outline: none;
            transition: transform 0.2s;
        }
        .theme-btn:hover {
            transform: scale(1.2);
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }
        h1 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        /* التعديل الجديد: سطر مستقل، لون مختلف، حجم أصغر */
        .sub-designer {
            display: block;
            font-size: 14.5px;
            color: #f6ad55; /* لون بصلي/ذهبي هادئ يكسر اللون بجمال */
            font-weight: 600;
            margin-top: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        p.subtitle {
            color: #cbd5e1;
            font-size: 13.5px;
            margin: 12px 0 0 0;
            font-weight: 500;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            color: #f1f5f9;
            font-weight: 600;
            font-size: 15.5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .menu-item span.icon-text {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .menu-item .emoji {
            font-size: 22px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .menu-item .arrow {
            color: #cbd5e1;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Hover Effects */
        .menu-item:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(246, 173, 85, 0.4);
            box-shadow: 0 12px 25px -5px rgba(246, 173, 85, 0.2);
            color: #ffffff;
        }
        .menu-item:hover .arrow {
            transform: translateX(-5px);
            color: #f6ad55;
            background: rgba(246, 173, 85, 0.15);
        }
        .menu-item:hover .emoji {
            background: rgba(246, 173, 85, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .dashboard-container {
                padding: 22px 15px;
            }
            h1 {
                font-size: 21px;
            }
            .menu-item {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- زر تغيير الألوان السريع -->
        <div class="theme-selector">
            <button class="theme-btn" style="background: #2c161d;" onclick="changeTheme('peach')" title="بصلي فاخر"></button>
            <button class="theme-btn" style="background: #312e81;" onclick="changeTheme('purple')" title="ليلي عميق"></button>
            <button class="theme-btn" style="background: #0f172a;" onclick="changeTheme('dark')" title="داكن فخم"></button>
            <button class="theme-btn" style="background: #064e3b;" onclick="changeTheme('emerald')" title="زمردي هادئ"></button>
        </div>

        <div class="dashboard-header">
            <h1>
                نظام إصدار الكتب والمخاطبات الرسمية
                <span class="sub-designer">تصميم عصام جاسم الأسدي - مدير اعدادية النجدين</span>
            </h1>
            <p class="subtitle">يرجى اختيار نوع الطلب أو النموذج المطلوب للإصدار</p>
        </div>

        <div class="menu-list">
            <a href="mubashara_teacher.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👨‍🏫</span>
                    مباشرة و انفكاك مدرس
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="mubashara_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👤</span>
                    مباشرة و انفكاك موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_teacher_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📜</span>
                    تأييد مدرس و موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_no_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">🎓</span>
                    تأييد طالب بدون درجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_with_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📊</span>
                    تأييد طالب بالدرجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="namatj_mukhataba.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📁</span>
                    نماذج مخاطبة
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="other.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">⚙️</span>
                    أخرى
                </span>
                <span class="arrow">←</span>
            </a>
        </div>
    </div>

    <script>
        function changeTheme(theme) {
            const body = document.body;
            if (theme === 'peach') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%)';
            } else if (theme === 'purple') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #3b3069 0%, #1e1b4b 40%, #0f0c1b 100%)';
            } else if (theme === 'dark') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #334155 0%, #1e293b 40%, #0f172a 100%)';
            } else if (theme === 'emerald') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #065f46 0%, #064e3b 40%, #022c22 100%)';
            }
        }
    </script>

</body>
</html>
