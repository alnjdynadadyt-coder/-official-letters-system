<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار الكتب والمخاطبات الرسمية</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            direction: rtl;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            margin: auto;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dashboard-header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 {
            color: #1a202c;
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        p.subtitle {
            color: #718096;
            font-size: 14px;
            margin: 0;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #2d3748;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-item span.icon-text {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-item .emoji {
            font-size: 20px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .menu-item .arrow {
            color: #a0aec0;
            font-size: 16px;
            transition: transform 0.3s, color 0.3s;
        }
        .menu-item:hover {
            transform: translateY(-3px);
            border-color: #3182ce;
            box-shadow: 0 8px 20px rgba(49, 130, 206, 0.15);
            color: #2b6cb0;
        }
        .menu-item:hover .arrow {
            transform: translateX(-5px);
            color: #3182ce;
        }
        .menu-item:hover .emoji {
            background: #ebf8ff;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .dashboard-container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">

            <p class="subtitle">يرجى اختيار نوع الطلب أو النموذج المطلوب للإصدار</p>
        </div>

        <div class="menu-list">
            <a href="mubashara_teacher.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👨‍🏫</span>
                    مباشرة و انفكاك مدرس
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="mubashara_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👤</span>
                    مباشرة و انفكاك موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_teacher_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📜</span>
                    تأييد مدرس و موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_no_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">🎓</span>
                    تأييد طالب بدون درجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_with_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📊</span>
                    تأييد طالب بالدرجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="namatj_mukhataba.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📁</span>
                    نماذج مخاطبة
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="other.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">⚙️</span>
                    أخرى
                </span>
                <span class="arrow">←</span>
            </a>
        </div>
    </div>

</body>
</html>
