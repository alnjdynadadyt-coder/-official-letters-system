<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار الكتب والمخاطبات الرسمية</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body {
            /* اللون الافتراضي: البصلي الفاخر (دافئ) */
            background: radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            direction: rtl;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin: auto;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
        }

        /* القائمة المنسدلة لاختيار الثيم اللوني */
        .theme-selector-container {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .theme-dropdown {
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }
        .theme-dropdown optgroup {
            background: #1e293b;
            color: #f6ad55;
            font-weight: bold;
        }
        .theme-dropdown option {
            background: #1e293b;
            color: #ffffff;
            padding: 10px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 15px;
        }
        h1 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .sub-designer {
            display: block;
            font-size: 14.5px;
            color: #f6ad55;
            font-weight: 600;
            margin-top: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        p.subtitle {
            color: #cbd5e1;
            font-size: 13.5px;
            margin: 12px 0 0 0;
            font-weight: 500;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            color: #f1f5f9;
            font-weight: 600;
            font-size: 15.5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .menu-item span.icon-text {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .menu-item .emoji {
            font-size: 22px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .menu-item .arrow {
            color: #cbd5e1;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-item:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(246, 173, 85, 0.5);
            box-shadow: 0 12px 25px -5px rgba(246, 173, 85, 0.2);
            color: #ffffff;
        }
        .menu-item:hover .arrow {
            transform: translateX(-5px);
            color: #f6ad55;
            background: rgba(246, 173, 85, 0.2);
        }
        .menu-item:hover .emoji {
            background: rgba(246, 173, 85, 0.25);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .dashboard-container {
                padding: 22px 15px;
            }
            h1 {
                font-size: 21px;
            }
            .menu-item {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- القائمة المنسدلة مقسمة حسب عجلة الألوان -->
        <div class="theme-selector-container">
            <select class="theme-dropdown" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="peach">🎨 عجلة الألوان</option>
                
                <optgroup label="🔥 ألوان دافئة (Warm Colors)">
                    <option value="peach">بصلي فاخر</option>
                    <option value="pink">🌸 وردي فاخر الصريح</option>
                    <option value="red">❤️ أحمر فاخر</option>
                </optgroup>

                <optgroup label="❄️ ألوان باردة (Cool Colors)">
                    <option value="pistachio">💚 فستقي منعش</option>
                    <option value="emerald">🌿 زمردي هادئ</option>
                    <option value="purple">💜 ليلي عميق</option>
                </optgroup>

                <optgroup label="⚪ خيارات محايدة وأنظمة أخرى">
                    <option value="white">🤍 أبيض مبرق</option>
                    <option value="dark">🌙 داكن فخم</option>
                </optgroup>
            </select>
        </div>

        <div class="dashboard-header">
            <h1>
                نظام إصدار الكتب والمخاطبات الرسمية
                <span class="sub-designer">تصميم عصام جاسم الأسدي - مدير اعدادية النجدين</span>
            </h1>
            <p class="subtitle">يرجى اختيار نوع الطلب أو النموذج المطلوب للإصدار</p>
        </div>

        <div class="menu-list">
            <a href="mubashara_teacher.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👨‍🏫</span>
                    مباشرة و انفكاك مدرس
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="mubashara_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">👤</span>
                    مباشرة و انفكاك موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_teacher_employee.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📜</span>
                    تأييد مدرس و موظف
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_no_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">🎓</span>
                    تأييد طالب بدون درجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="taayeed_student_with_grades.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📊</span>
                    تأييد طالب بالدرجات
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="namatj_mukhataba.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">📁</span>
                    نماذج مخاطبة
                </span>
                <span class="arrow">←</span>
            </a>

            <a href="other.html" class="menu-item">
                <span class="icon-text">
                    <span class="emoji">⚙️</span>
                    أخرى
                </span>
                <span class="arrow">←</span>
            </a>
        </div>
    </div>

    <script>
        function applyTheme(theme) {
            const body = document.body;
            if (theme === 'peach') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'pink') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #f472b6 0%, #db2777 40%, #831843 100%)';
                body.style.color = '#fff1f2';
            } else if (theme === 'pistachio') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #386641 0%, #283618 40%, #111d08 100%)';
                body.style.color = '#fefae0';
            } else if (theme === 'red') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #e11d48 0%, #9f1239 40%, #4c0519 100%)';
                body.style.color = '#fff1f2';
            } else if (theme === 'white') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #f8fafc 0%, #cbd5e1 40%, #94a3b8 100%)';
                body.style.color = '#0f172a';
            } else if (theme === 'purple') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #3b3069 0%, #1e1b4b 40%, #0f0c1b 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'emerald') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #065f46 0%, #064e3b 40%, #022c22 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'dark') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #334155 0%, #1e293b 40%, #0f172a 100%)';
                body.style.color = '#f8fafc';
            }
        }

        function changeTheme(theme) {
            applyTheme(theme);
            // حفظ اللون المختار في ذاكرة المتصفح ليثبت بشكل دائم
            localStorage.setItem('userSelectedTheme', theme);
        }

        // استرجاع وثبات اللون المختار تلقائياً عند فتح أو تحديث الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('userSelectedTheme');
            if (savedTheme) {
                applyTheme(savedTheme);
                const themeSelect = document.getElementById('themeSelect');
                if (themeSelect) {
                    themeSelect.value = savedTheme;
                }
            }
        });
    </script>

</body>
</html>
