<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأييد استمرار مدرس أو موظف</title>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            direction: rtl;
            color: #2d3748;
        }
        .form-container {
            max-width: 750px;
            background: #ffffff;
            margin: 0 auto;
            padding: 18px 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border-top: 5px solid #d69e2e;
        }
        .form-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 8px;
        }
        h2 {
            color: #1a202c;
            margin: 0;
            font-size: 19px;
            font-weight: 700;
        }
        
        .section-box {
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .sec-print { background: #f0f9ff; border-color: #bae6fd; }
        .sec-admin { background: #fdf4ff; border-color: #f5d0fe; }
        .sec-person { background: #f0fdf4; border-color: #bbf7d0; }

        .section-title {
            font-size: 13.5px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 4px;
        }
        .sec-print .section-title { color: #0284c7; }
        .sec-admin .section-title { color: #c084fc; }
        .sec-person .section-title { color: #16a34a; }

        .form-group {
            margin-bottom: 8px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
            color: #4a5568;
            font-size: 12.5px;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #d69e2e;
            box-shadow: 0 0 0 3px rgba(214, 158, 46, 0.15);
        }
        .btn-submit {
            background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
            color: white;
            border: none;
            padding: 11px 20px;
            font-size: 14.5px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 4px;
            box-shadow: 0 4px 12px rgba(214, 158, 46, 0.25);
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #b7791f 100%, #975a16 100%);
            box-shadow: 0 6px 15px rgba(214, 158, 46, 0.35);
        }
        .back-link {
            display: inline-block;
            background-color: #edf2f7;
            color: #4a5568;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-link:hover {
            background-color: #e2e8f0;
            color: #1a202c;
        }
        .back-link-bottom {
            display: block;
            text-align: center;
            margin-top: 12px;
        }

        #printArea {
            display: none;
        }

        @media print {
            @page {
                size: A4;
                margin: 0mm;
            }
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 210mm;
                height: 297mm;
                overflow: hidden;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                box-sizing: border-box;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="form-container no-print">
        <div class="form-header-flex">
            <h2>إصدار تأييد استمرار (مدرس / موظف)</h2>
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>

        <form id="taiyidForm" onsubmit="generatePDF(event)">
            
            <div class="section-box sec-print">
                <div class="section-title">⚙️ الخيارات وطريقة الطباعة</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>نوع الفئة:</label>
                        <select id="categoryInput" onchange="toggleCategoryFields()">
                            <option value="teacher">مدرس / مدرسة</option>
                            <option value="employee">موظف / موظفة</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>نظام النسخ:</label>
                        <select id="copiesLayout">
                            <option value="one">نسخة واحدة (تملأ الصفحة)</option>
                            <option value="two">نسختان (نفس الورقة)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section-box sec-admin">
                <div class="section-title">📋 المعلومات الإدارية للكتاب</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>الترويسة العليا:</label>
                        <input type="text" id="headerTitleInput" required value="وزارة التربية">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>اسم المؤسسة (اعداديتنا / متوسطتنا / ثانويتنا...):</label>
                        <input type="text" id="schoolNameInput" required placeholder="اعدادية النجدين للبنين">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div class="form-group" style="flex: 1;">
                        <label>رقم العدد:</label>
                        <input type="text" id="bookNumberInput" required placeholder="مثال 105">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>التاريخ:</label>
                        <input type="date" id="dateInput" required>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div class="form-group" style="flex: 1;">
                        <label>إلى (الجهة الموجه لها الكتاب):</label>
                        <input type="text" id="toInput" required placeholder="إلى المديرية العامة لتربية القادسية - قسم الملاك الثانوي">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>العام الدراسي:</label>
                        <input type="text" id="academicYearInput" required value="2025 - 2026">
                    </div>
                </div>
            </div>

            <div class="section-box sec-person">
                <div class="section-title">👤 بيانات المعني بالأمر</div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>الجنس:</label>
                        <select id="genderInput">
                            <option value="male">ذكر</option>
                            <option value="female">أنثى</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>الاسم الكامل:</label>
                        <input type="text" id="personNameInput" required placeholder="محمد علي حسن">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 8px;" id="teacherFields">
                    <label>الاختصاص:</label>
                    <input type="text" id="subjectInput" placeholder="التربية الإسلامية">
                </div>

                <div class="form-group" style="margin-top: 8px; display: none;" id="employeeFields">
                    <label>العنوان الوظيفي:</label>
                    <input type="text" id="jobTitleInput" placeholder="موظف خدمة / كاتب / ملاحظ...">
                </div>

                <div class="form-group" style="margin-top: 8px;">
                    <label>اسم مدير المدرسة:</label>
                    <input type="text" id="managerNameInput" required placeholder="عصام الاسدي">
                </div>
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة كتاب التأييد (PDF)</button>
        </form>

        <div class="back-link-bottom">
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <div id="printArea">
        <div id="documentWrapper" style="width: 100%; height: 100%; box-sizing: border-box;"></div>
    </div>

    <script>
        function toggleCategoryFields() {
            const category = document.getElementById('categoryInput').value;
            const teacherFields = document.getElementById('teacherFields');
            const employeeFields = document.getElementById('employeeFields');
            
            if (category === 'teacher') {
                teacherFields.style.display = 'block';
                employeeFields.style.display = 'none';
                document.getElementById('subjectInput').required = true;
                document.getElementById('jobTitleInput').required = false;
            } else {
                teacherFields.style.display = 'none';
                employeeFields.style.display = 'block';
                document.getElementById('subjectInput').required = false;
                document.getElementById('jobTitleInput').required = true;
            }
        }

        window.onload = function() {
            toggleCategoryFields();
        };

        function formatDateToDMY(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }

        function generatePDF(e) {
            e.preventDefault();
            
            const category = document.getElementById('categoryInput').value;
            const headerTitle = document.getElementById('headerTitleInput').value;
            const schoolName = document.getElementById('schoolNameInput').value;
            const bookNum = document.getElementById('bookNumberInput').value;
            const dateVal = formatDateToDMY(document.getElementById('dateInput').value);
            const toVal = document.getElementById('toInput').value;
            const academicYear = document.getElementById('academicYearInput').value;
            
            const gender = document.getElementById('genderInput').value;
            const personName = document.getElementById('personNameInput').value;
            const managerName = document.getElementById('managerNameInput').value;
            const layoutMode = document.getElementById('copiesLayout').value;

            let bodyText = "";

            if (category === 'teacher') {
                const subject = document.getElementById('subjectInput').value;
                if (gender === 'female') {
                    bodyText = `نؤيد لكم ان السيدة (<b>${personName}</b>) مدرسة اختصاص (${subject}) في (${schoolName}) مستمرة بالدوام للعام الدراسي (${academicYear}) وبناءً على طلبها زود بهذا التأييد..`;
                } else {
                    bodyText = `نؤيد لكم ان السيد (<b>${personName}</b>) مدرس اختصاص (${subject}) في (${schoolName}) مستمر بالدوام للعام الدراسي (${academicYear}) وبناءً على طلبه زود بهذا التأييد..`;
                }
            } else {
                const jobTitle = document.getElementById('jobTitleInput').value;
                if (gender === 'female') {
                    bodyText = `نؤيد لكم ان السيدة (<b>${personName}</b>) موظفة بعنوان (${jobTitle}) في (${schoolName}) مستمرة بالدوام للعام الدراسي (${academicYear}) وبناءً على طلبها زود بهذا التأييد..`;
                } else {
                    bodyText = `نؤيد لكم ان السيد (<b>${personName}</b>) موظف بعنوان (${jobTitle}) في (${schoolName}) مستمر بالدوام للعام الدراسي (${academicYear}) وبناءً على طلبه زود بهذا التأييد..`;
                }
            }

            const createCardHTML = (isTwoCopies) => `
                <div style="margin: ${isTwoCopies ? '2mm 6mm' : '5mm 8mm'}; border: 2.5px solid #1a202c; padding: ${isTwoCopies ? '4mm 6mm' : '8mm 14mm'}; border-radius: 8px; background: #fff; height: ${isTwoCopies ? '135mm' : '287mm'}; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div style="text-align: center; font-weight: bold; font-size: ${isTwoCopies ? '13.5px' : '17.5px'}; margin-bottom: ${isTwoCopies ? '1.5mm' : '4mm'};">
                            ${headerTitle}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: ${isTwoCopies ? '2.5mm' : '6mm'}; font-weight: bold; font-size: ${isTwoCopies ? '12px' : '14.5px'};">
                            <tr>
                                <td style="width: 50%; text-align: right;">إدارة / ${schoolName}</td>
                                <td style="width: 50%; text-align: left;">
                                    العدد: ${bookNum}<br>
                                    التاريخ: ${dateVal}
                                </td>
                            </tr>
                        </table>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '2.5mm' : '5mm'};">
                            إلى / ${toVal}
                        </div>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '4mm' : '8mm'};">
                            م/ تأييد استمرارية
                        </div>

                        <div style="font-size: ${isTwoCopies ? '12.5px' : '15px'}; line-height: ${isTwoCopies ? '1.8' : '2.3'}; text-align: justify; padding: 0 2mm;">
                            ${bodyText}
                        </div>
                    </div>

                    <div style="margin-bottom: ${isTwoCopies ? '1.5mm' : '4mm'};">
                        <div style="text-align: center; font-size: ${isTwoCopies ? '12.5px' : '15px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '3mm' : '6mm'};">
                            للعلـم مع التقـدير
                        </div>

                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="width: 78%;"></td>
                                <td style="width: 22%; text-align: right; font-size: ${isTwoCopies ? '12px' : '14px'}; line-height: 1.3; padding-right: 5px;">
                                    <b>${managerName}</b><br>
                                    مدير المدرسة
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;

            const wrapper = document.getElementById('documentWrapper');

            if (layoutMode === 'two') {
                wrapper.innerHTML = `
                    <div style="height: 148.5mm; display: flex; flex-direction: column; justify-content: flex-start;">
                        ${createCardHTML(true)}
                    </div>
                    <div style="height: 148.5mm; display: flex; flex-direction: column; justify-content: flex-end;">
                        ${createCardHTML(true)}
                    </div>
                `;
            } else {
                wrapper.innerHTML = `<div style="height: 297mm; display: flex; flex-direction: column; justify-content: center;">${createCardHTML(false)}</div>`;
            }

            window.print();
        }
    </script>

</body>
</html>
