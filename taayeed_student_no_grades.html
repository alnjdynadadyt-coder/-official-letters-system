<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأييد طالب بدون درجات - نظام إصدار الكتب والمخاطبات الرسمية</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin: auto;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            backdrop-filter: blur(5px);
        }
        .back-btn:hover {
            background: rgba(246, 173, 85, 0.3);
            border-color: #f6ad55;
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 800;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #f6ad55;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14.5px;
            font-family: inherit;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #f6ad55;
            box-shadow: 0 0 10px rgba(246, 173, 85, 0.2);
        }
        option {
            background: #1e293b;
            color: #ffffff;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #f6ad55, #dd6b20);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(221, 107, 32, 0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        #printArea {
            display: none;
        }

        @media print {
            @page {
                size: A4;
                margin: 0mm;
            }
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 210mm;
                height: 297mm;
                overflow: hidden;
                font-family: 'Traditional Arabic', 'Amiri', serif;
                background: white;
                color: black;
                box-sizing: border-box;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body style="background: radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%); color: #f8fafc;">

    <div class="container no-print">
        <a href="index.html" class="back-btn">العودة للرئيسية ←</a>
        <h2>تأييد طالب بدون درجات</h2>

        <form id="taayeedForm" onsubmit="generatePDF(event)">
            <div class="form-group">
                <label>نظام النسخ:</label>
                <select id="copiesLayout">
                    <option value="one">نسخة واحدة (تملأ الصفحة)</option>
                    <option value="two">نسختان (في نفس الصفحة A4)</option>
                </select>
            </div>

            <div class="form-group">
                <label>الترويسة العليا:</label>
                <input type="text" id="headerTitleInput" required placeholder="مثال: المديرية العامة لتربية القادسية - قسم تربية الحمزة&#10;إعدادية النجدين للبنين">
            </div>

            <div class="form-group">
                <label>اسم المؤسسة / المدرسة:</label>
                <input type="text" id="schoolNameInput" required placeholder="مثال: إعدادية النجدين للبنين">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>رقم العدد:</label>
                    <input type="text" id="bookNumberInput" required placeholder="مثال: 333">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>تاريخ الكتاب:</label>
                    <input type="date" id="dateInput" required>
                </div>
            </div>

            <div class="form-group">
                <label>إلى / (الجهة المطلوبة):</label>
                <input type="text" id="targetEntity" required placeholder="مثال: دائرة التقاعد">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>اسم الطالب / الطالبة الثلاثي:</label>
                    <input type="text" id="studentName" required placeholder="أدخل اسم الطالب أو الطالبة كاملاً">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>جنس الطالب:</label>
                    <select id="studentGender" required>
                        <option value="male">ذكر (طالب)</option>
                        <option value="female">أنثى (طالبة)</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>الصف الدراسي:</label>
                    <input type="text" id="studentClass" required placeholder="مثال: الأول المتوسط">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>العام الدراسي:</label>
                    <input type="text" id="academicYear" required placeholder="مثال: 2025 - 2026">
                </div>
            </div>

            <div class="form-group">
                <label>اسم المدير:</label>
                <input type="text" id="managerName" required placeholder="أدخل اسم مدير المدرسة">
            </div>

            <button type="submit" class="btn-submit">عرض وطباعة كتاب التأييد (PDF)</button>
        </form>
    </div>

    <div id="printArea">
        <div id="documentWrapper" style="width: 100%; height: 100%; box-sizing: border-box;"></div>
    </div>

    <script>
        function applyTheme(theme) {
            const body = document.body;
            if (theme === 'peach') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #4a2832 0%, #2c161d 40%, #150a0e 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'pink') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #f472b6 0%, #db2777 40%, #831843 100%)';
                body.style.color = '#fff1f2';
            } else if (theme === 'pistachio') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #386641 0%, #283618 40%, #111d08 100%)';
                body.style.color = '#fefae0';
            } else if (theme === 'red') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #e11d48 0%, #9f1239 40%, #4c0519 100%)';
                body.style.color = '#fff1f2';
            } else if (theme === 'white') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #f8fafc 0%, #cbd5e1 40%, #94a3b8 100%)';
                body.style.color = '#0f172a';
            } else if (theme === 'purple') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #3b3069 0%, #1e1b4b 40%, #0f0c1b 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'emerald') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #065f46 0%, #064e3b 40%, #022c22 100%)';
                body.style.color = '#f8fafc';
            } else if (theme === 'dark') {
                body.style.background = 'radial-gradient(circle at 50% 10%, #334155 0%, #1e293b 40%, #0f172a 100%)';
                body.style.color = '#f8fafc';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('userSelectedTheme');
            if (savedTheme) {
                applyTheme(savedTheme);
            }
        });

        function formatDateToDMY(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            return `${parts[2]} / ${parts[1]} / ${parts[0]}م`;
        }

        function generatePDF(e) {
            e.preventDefault();

            const headerTitle = document.getElementById('headerTitleInput').value.replace(/\n/g, '<br>');
            const schoolName = document.getElementById('schoolNameInput').value;
            const bookNum = document.getElementById('bookNumberInput').value;
            const dateVal = formatDateToDMY(document.getElementById('dateInput').value);
            const target = document.getElementById('targetEntity').value;
            const name = document.getElementById('studentName').value;
            const gender = document.getElementById('studentGender').value;
            const studentClass = document.getElementById('studentClass').value;
            const year = document.getElementById('academicYear').value;
            const manager = document.getElementById('managerName').value;
            const layoutMode = document.getElementById('copiesLayout').value;

            let line1 = "";
            let line2 = "";
            let line3 = "";

            if (gender === 'male') {
                line1 = `نؤيد لكم أن الطالب (<b>${name}</b>) أحد طلاب الصف (<b>${studentClass}</b>) مستمر بالدوام للعام الدراسي (<b>${year}</b>).`;
                line2 = `وبناءً على طلبه زود بهذا التأييد.`;
                line3 = `للعلم مع التقدير`;
            } else {
                line1 = `نؤيد لكم أن الطالبة (<b>${name}</b>) إحدى طالبات الصف (<b>${studentClass}</b>) مستمرة بالدوام للعام الدراسي (<b>${year}</b>).`;
                line2 = `وبناءً على طلبها زودت بهذا التأييد.`;
                line3 = `للعلم مع التقدير`;
            }

            const createCardHTML = (isTwoCopies) => `
                <div style="border: 2px solid #1a202c; padding: ${isTwoCopies ? '2mm 4mm' : '6mm 12mm'}; border-radius: 6px; background: #fff; height: ${isTwoCopies ? '143mm' : '292mm'}; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div style="text-align: center; font-weight: bold; font-size: ${isTwoCopies ? '12.5px' : '16px'}; margin-bottom: ${isTwoCopies ? '1mm' : '3mm'}; line-height: 1.35;">
                            ${headerTitle}<br>${schoolName}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: ${isTwoCopies ? '1.5mm' : '5mm'}; font-weight: bold; font-size: ${isTwoCopies ? '11px' : '13.5px'};">
                            <tr>
                                <td style="width: 50%; text-align: right;"></td>
                                <td style="width: 50%; text-align: left;">
                                    العدد: ${bookNum}<br>
                                    التاريخ: ${dateVal}
                                </td>
                            </tr>
                        </table>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '11.5px' : '14.5px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '1.5mm' : '4mm'};">
                            إلى / ${target}
                        </div>

                        <div style="text-align: center; font-size: ${isTwoCopies ? '11.5px' : '14.5px'}; font-weight: bold; margin-bottom: ${isTwoCopies ? '2.5mm' : '6mm'};">
                            م / تأييد طالب
                        </div>

                        <div style="font-size: ${isTwoCopies ? '11.5px' : '14.5px'}; line-height: ${isTwoCopies ? '1.6' : '2.1'}; text-align: justify; padding: 0 2mm;">
                            <div style="margin-bottom: ${isTwoCopies ? '1.5mm' : '3mm'};">${line1}</div>
                            <div style="margin-bottom: ${isTwoCopies ? '2mm' : '5mm'};">${line2}</div>
                            <div style="text-align: center; font-weight: bold; margin-top: ${isTwoCopies ? '3mm' : '8mm'};">${line3}</div>
                        </div>
                    </div>

                    <div style="margin-bottom: ${isTwoCopies ? '6mm' : '16mm'};">
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="width: 76%;"></td>
                                <td style="width: 24%; text-align: right; font-size: ${isTwoCopies ? '11px' : '13.5px'}; line-height: 1.3; padding-right: 5px;">
                                    <b>${manager}</b><br>
                                    مدير المدرسة
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;

            const wrapper = document.getElementById('documentWrapper');

            if (layoutMode === 'two') {
                wrapper.innerHTML = `
                    <div style="height: 148.5mm; padding: 1mm 3mm; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;">
                        ${createCardHTML(true)}
                    </div>
                    <div style="height: 148.5mm; padding: 1mm 3mm; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;">
                        ${createCardHTML(true)}
                    </div>
                `;
            } else {
                wrapper.innerHTML = `<div style="height: 297mm; padding: 1.5mm 3mm; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;">${createCardHTML(false)}</div>`;
            }

            window.print();
        }
    </script>
</body>
</html>
